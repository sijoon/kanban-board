<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:    '#0052cc',
            progress: '#ff8b00',
            success:  '#00875a',
            danger:   '#de350b',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f0f2f5] text-[#172b4d] font-sans leading-normal min-h-screen">

  <!-- ── 인증 오버레이 ── -->
  <div id="auth-overlay" class="fixed inset-0 bg-[#f0f2f5] flex items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.12)] px-9 py-10 w-full max-w-sm">
      <h1 class="text-[22px] font-bold text-[#172b4d] text-center mb-6 tracking-tight">Kanban Board</h1>

      <!-- 탭 -->
      <div class="flex border-b-2 border-[#dfe1e6] mb-5">
        <button class="auth-tab active flex-1 py-2.5 bg-transparent border-0 text-sm font-semibold text-[#6b778c] cursor-pointer relative -mb-0.5 border-b-2 border-transparent transition-colors" data-tab="signin">로그인</button>
        <button class="auth-tab flex-1 py-2.5 bg-transparent border-0 text-sm font-semibold text-[#6b778c] cursor-pointer relative -mb-0.5 border-b-2 border-transparent transition-colors" data-tab="signup">회원가입</button>
      </div>

      <!-- 이메일/비밀번호 폼 -->
      <form class="flex flex-col gap-2" id="auth-form" novalidate>
        <input id="auth-email" class="w-full px-3.5 py-2.5 border border-[#dfe1e6] rounded-md text-sm text-[#172b4d] bg-white outline-none focus:border-brand transition-colors" type="email" placeholder="이메일" autocomplete="email" required />
        <input id="auth-password" class="w-full px-3.5 py-2.5 border border-[#dfe1e6] rounded-md text-sm text-[#172b4d] bg-white outline-none focus:border-brand transition-colors" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" required />
        <p class="text-[13px] text-danger bg-red-50 rounded px-2.5 py-2 m-0 hidden" id="auth-error"></p>
        <button class="w-full py-3 bg-brand text-white border-0 rounded-md text-[15px] font-semibold cursor-pointer mt-1 hover:bg-[#0041a3] disabled:opacity-60 disabled:cursor-not-allowed transition-colors" type="submit" id="auth-submit">로그인</button>
      </form>

      <!-- 구분선 -->
      <div class="flex items-center gap-3 my-5 text-[#6b778c] text-[13px] before:content-[''] before:flex-1 before:h-px before:bg-[#dfe1e6] after:content-[''] after:flex-1 after:h-px after:bg-[#dfe1e6]"><span>또는</span></div>

      <!-- 소셜 로그인 -->
      <div class="flex flex-col gap-2">
        <button class="flex items-center justify-center gap-2.5 w-full py-2.5 rounded-md text-sm font-medium cursor-pointer bg-white border border-[#dfe1e6] text-[#172b4d] hover:bg-gray-50 hover:shadow-sm transition-all" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Google로 계속하기
        </button>
        <button class="flex items-center justify-center gap-2.5 w-full py-2.5 rounded-md text-sm font-medium cursor-pointer bg-[#24292f] border border-[#24292f] text-white hover:bg-[#1a1f24] transition-colors" id="btn-github">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub로 계속하기
        </button>
      </div>
    </div>
  </div>

  <!-- ── 앱 본체 (로그인 후 표시) ── -->
  <header class="h-14 bg-brand flex items-center justify-between px-6 hidden" id="app-header">
    <h1 class="text-xl font-bold text-white tracking-tight">Kanban Board</h1>
    <div class="flex items-center gap-2">
      <select id="group-selector" class="px-2 py-1 rounded-md border border-white/40 text-[13px] bg-white/15 text-white cursor-pointer max-w-[160px] outline-none">
        <option value="">내 보드</option>
      </select>
      <button id="btn-create-group" class="px-2.5 py-1.5 rounded border border-white/30 text-[13px] cursor-pointer bg-white/15 text-white hover:bg-white/25 transition-colors whitespace-nowrap">+ 그룹</button>
      <button id="btn-join-group" class="px-2.5 py-1.5 rounded border border-white/30 text-[13px] cursor-pointer bg-white/15 text-white hover:bg-white/25 transition-colors whitespace-nowrap">코드 참여</button>
    </div>
    <div class="flex items-center gap-3">
      <button class="px-3 py-1.5 bg-white/15 border border-white/30 rounded text-white text-[13px] cursor-pointer hover:bg-white/25 transition-colors hidden" id="btn-activity-log">활동 기록</button>
      <span class="text-[13px] text-white/85 max-w-[200px] overflow-hidden text-ellipsis whitespace-nowrap" id="user-email"></span>
      <button class="px-3 py-1.5 bg-white/15 border border-white/30 rounded text-white text-[13px] cursor-pointer hover:bg-white/25 transition-colors" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="flex flex-row items-start gap-4 p-6 overflow-x-auto min-h-[calc(100vh-56px)] hidden" id="board">

    <!-- To-do -->
    <section class="column w-[280px] min-w-[280px] bg-[#ebecf0] rounded-lg flex flex-col max-h-[calc(100vh-112px)]" data-column="todo">
      <div class="column-header flex items-center justify-between px-4 py-3 border-b-[3px] border-transparent flex-shrink-0">
        <h2 class="text-sm font-bold text-[#172b4d] uppercase tracking-[0.4px]">To-do</h2>
        <span class="card-count text-xs font-semibold text-[#6b778c] bg-[#dfe1e6] rounded-full py-0.5 px-2 min-w-[22px] text-center">0</span>
      </div>
      <div class="column-body flex-1 overflow-y-auto p-2 flex flex-col gap-2 min-h-[64px] transition-colors" data-column="todo"></div>
      <div class="p-2 flex-shrink-0">
        <button class="add-card-btn w-full px-3 py-2 bg-transparent border-0 rounded-md text-[#6b778c] text-sm text-left cursor-pointer hover:bg-black/[0.08] hover:text-[#172b4d] transition-colors" data-target="todo">+ Add card</button>
        <div class="add-card-form flex flex-col gap-2 hidden" data-form="todo">
          <textarea class="card-input w-full px-2.5 py-2 border-2 border-brand rounded-md text-sm font-[inherit] resize-none outline-none bg-white text-[#172b4d] shadow-sm transition-colors" placeholder="카드 내용을 입력하세요…" rows="3"></textarea>
          <div class="flex items-center gap-2">
            <button class="bg-brand text-white border-0 rounded px-3.5 py-1.5 text-sm font-semibold cursor-pointer hover:bg-[#0041a3] transition-colors" data-target="todo">Add</button>
            <button class="bg-transparent border-0 text-[#6b778c] text-xl leading-none cursor-pointer px-1.5 py-0.5 rounded hover:text-[#172b4d] hover:bg-black/[0.08] transition-colors cancel-add-btn" data-target="todo">✕</button>
          </div>
        </div>
      </div>
    </section>

    <!-- In-progress -->
    <section class="column w-[280px] min-w-[280px] bg-[#ebecf0] rounded-lg flex flex-col max-h-[calc(100vh-112px)]" data-column="inprogress">
      <div class="column-header flex items-center justify-between px-4 py-3 border-b-[3px] border-transparent flex-shrink-0">
        <h2 class="text-sm font-bold text-[#172b4d] uppercase tracking-[0.4px]">In-progress</h2>
        <span class="card-count text-xs font-semibold text-[#6b778c] bg-[#dfe1e6] rounded-full py-0.5 px-2 min-w-[22px] text-center">0</span>
      </div>
      <div class="column-body flex-1 overflow-y-auto p-2 flex flex-col gap-2 min-h-[64px] transition-colors" data-column="inprogress"></div>
      <div class="p-2 flex-shrink-0">
        <button class="add-card-btn w-full px-3 py-2 bg-transparent border-0 rounded-md text-[#6b778c] text-sm text-left cursor-pointer hover:bg-black/[0.08] hover:text-[#172b4d] transition-colors" data-target="inprogress">+ Add card</button>
        <div class="add-card-form flex flex-col gap-2 hidden" data-form="inprogress">
          <textarea class="card-input w-full px-2.5 py-2 border-2 border-brand rounded-md text-sm font-[inherit] resize-none outline-none bg-white text-[#172b4d] shadow-sm transition-colors" placeholder="카드 내용을 입력하세요…" rows="3"></textarea>
          <div class="flex items-center gap-2">
            <button class="bg-brand text-white border-0 rounded px-3.5 py-1.5 text-sm font-semibold cursor-pointer hover:bg-[#0041a3] transition-colors" data-target="inprogress">Add</button>
            <button class="bg-transparent border-0 text-[#6b778c] text-xl leading-none cursor-pointer px-1.5 py-0.5 rounded hover:text-[#172b4d] hover:bg-black/[0.08] transition-colors cancel-add-btn" data-target="inprogress">✕</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Done -->
    <section class="column w-[280px] min-w-[280px] bg-[#ebecf0] rounded-lg flex flex-col max-h-[calc(100vh-112px)]" data-column="done">
      <div class="column-header flex items-center justify-between px-4 py-3 border-b-[3px] border-transparent flex-shrink-0">
        <h2 class="text-sm font-bold text-[#172b4d] uppercase tracking-[0.4px]">Done</h2>
        <span class="card-count text-xs font-semibold text-[#6b778c] bg-[#dfe1e6] rounded-full py-0.5 px-2 min-w-[22px] text-center">0</span>
      </div>
      <div class="column-body flex-1 overflow-y-auto p-2 flex flex-col gap-2 min-h-[64px] transition-colors" data-column="done"></div>
      <div class="p-2 flex-shrink-0">
        <button class="add-card-btn w-full px-3 py-2 bg-transparent border-0 rounded-md text-[#6b778c] text-sm text-left cursor-pointer hover:bg-black/[0.08] hover:text-[#172b4d] transition-colors" data-target="done">+ Add card</button>
        <div class="add-card-form flex flex-col gap-2 hidden" data-form="done">
          <textarea class="card-input w-full px-2.5 py-2 border-2 border-brand rounded-md text-sm font-[inherit] resize-none outline-none bg-white text-[#172b4d] shadow-sm transition-colors" placeholder="카드 내용을 입력하세요…" rows="3"></textarea>
          <div class="flex items-center gap-2">
            <button class="bg-brand text-white border-0 rounded px-3.5 py-1.5 text-sm font-semibold cursor-pointer hover:bg-[#0041a3] transition-colors" data-target="done">Add</button>
            <button class="bg-transparent border-0 text-[#6b778c] text-xl leading-none cursor-pointer px-1.5 py-0.5 rounded hover:text-[#172b4d] hover:bg-black/[0.08] transition-colors cancel-add-btn" data-target="done">✕</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── 활동 기록 패널 ── -->
  <aside id="activity-panel" class="fixed right-0 top-14 w-[300px] h-[calc(100vh-56px)] bg-white shadow-[-4px_0_16px_rgba(0,0,0,0.12)] flex flex-col z-[150]">
    <div class="flex items-center justify-between p-4 border-b border-[#dfe1e6] flex-shrink-0">
      <h3 class="text-[15px] font-bold text-[#172b4d] m-0">활동 기록</h3>
      <div class="flex gap-0.5">
        <button id="btn-activity-refresh" class="bg-transparent border-0 text-[#6b778c] text-[15px] cursor-pointer px-2 py-1 rounded hover:bg-[#dfe1e6] hover:text-[#172b4d] transition-colors" title="새로고침">↻</button>
        <button id="btn-activity-close" class="bg-transparent border-0 text-[#6b778c] text-[15px] cursor-pointer px-2 py-1 rounded hover:bg-[#dfe1e6] hover:text-[#172b4d] transition-colors" title="닫기">✕</button>
      </div>
    </div>
    <div id="activity-list" class="flex-1 overflow-y-auto p-2"></div>
  </aside>

  <!-- ── 그룹 생성 모달 ── -->
  <div id="modal-create-group" class="fixed inset-0 bg-black/45 flex items-center justify-center z-[200] p-4 hidden">
    <div class="bg-white rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.2)] p-8 w-full max-w-[340px] flex flex-col gap-4">
      <h2 class="text-lg font-bold text-[#172b4d] m-0">새 그룹 만들기</h2>
      <input id="group-name-input" type="text" class="w-full px-3.5 py-2.5 border border-[#dfe1e6] rounded-md text-sm font-[inherit] text-[#172b4d] outline-none focus:border-brand transition-colors" placeholder="그룹 이름" maxlength="30" />
      <p id="create-group-error" class="text-[13px] text-danger bg-red-50 rounded px-2.5 py-2 m-0 hidden"></p>
      <div class="flex gap-2">
        <button id="btn-create-group-confirm" class="flex-1 bg-brand text-white border-0 rounded px-3.5 py-1.5 text-sm font-semibold cursor-pointer hover:bg-[#0041a3] transition-colors">만들기</button>
        <button id="btn-create-group-cancel" class="flex-1 px-3.5 py-1.5 bg-[#f4f5f7] border-0 rounded text-[#6b778c] text-sm font-semibold cursor-pointer hover:bg-[#dfe1e6] transition-colors">취소</button>
      </div>
    </div>
  </div>

  <!-- ── 초대 코드 표시 모달 ── -->
  <div id="modal-invite-code" class="fixed inset-0 bg-black/45 flex items-center justify-center z-[200] p-4 hidden">
    <div class="bg-white rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.2)] p-8 w-full max-w-[340px] flex flex-col gap-4">
      <h2 class="text-lg font-bold text-[#172b4d] m-0">그룹이 만들어졌습니다</h2>
      <p class="text-sm text-[#6b778c] m-0">아래 초대 코드를 멤버에게 공유하세요.</p>
      <div id="invite-code-display" class="text-4xl font-bold tracking-[8px] text-center p-4 bg-[#f4f5f7] rounded-lg text-[#172b4d] font-mono"></div>
      <div class="flex gap-2">
        <button id="btn-copy-invite-code" class="flex-1 bg-brand text-white border-0 rounded px-3.5 py-1.5 text-sm font-semibold cursor-pointer hover:bg-[#0041a3] transition-colors">복사</button>
        <button id="btn-close-invite-code" class="flex-1 px-3.5 py-1.5 bg-[#f4f5f7] border-0 rounded text-[#6b778c] text-sm font-semibold cursor-pointer hover:bg-[#dfe1e6] transition-colors">닫기</button>
      </div>
    </div>
  </div>

  <!-- ── 그룹 참여 모달 ── -->
  <div id="modal-join-group" class="fixed inset-0 bg-black/45 flex items-center justify-center z-[200] p-4 hidden">
    <div class="bg-white rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.2)] p-8 w-full max-w-[340px] flex flex-col gap-4">
      <h2 class="text-lg font-bold text-[#172b4d] m-0">그룹 참여</h2>
      <input id="invite-code-input" type="text" class="w-full px-3.5 py-2.5 border border-[#dfe1e6] rounded-md text-sm font-[inherit] text-[#172b4d] outline-none focus:border-brand transition-colors" placeholder="초대 코드 6자리" maxlength="6" style="text-transform:uppercase" />
      <p id="join-group-error" class="text-[13px] text-danger bg-red-50 rounded px-2.5 py-2 m-0 hidden"></p>
      <div class="flex gap-2">
        <button id="btn-join-group-confirm" class="flex-1 bg-brand text-white border-0 rounded px-3.5 py-1.5 text-sm font-semibold cursor-pointer hover:bg-[#0041a3] transition-colors">참여</button>
        <button id="btn-join-group-cancel" class="flex-1 px-3.5 py-1.5 bg-[#f4f5f7] border-0 rounded text-[#6b778c] text-sm font-semibold cursor-pointer hover:bg-[#dfe1e6] transition-colors">취소</button>
      </div>
    </div>
  </div>

  <!-- ── 그룹으로 이동 모달 ── -->
  <div id="modal-move-to-group" class="fixed inset-0 bg-black/45 flex items-center justify-center z-[200] p-4 hidden">
    <div class="bg-white rounded-lg shadow-[0_8px_32px_rgba(0,0,0,0.2)] p-8 w-full max-w-[340px] flex flex-col gap-4">
      <h2 class="text-lg font-bold text-[#172b4d] m-0">그룹으로 이동</h2>
      <p class="text-sm text-[#6b778c] m-0">카드를 이동할 그룹을 선택하세요.</p>
      <div id="move-group-list" class="flex flex-col gap-2 mb-1"></div>
      <div class="flex gap-2">
        <button id="btn-move-group-cancel" class="flex-1 px-3.5 py-1.5 bg-[#f4f5f7] border-0 rounded text-[#6b778c] text-sm font-semibold cursor-pointer hover:bg-[#dfe1e6] transition-colors">취소</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
