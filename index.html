<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── 인증 오버레이 ── -->
  <div id="auth-overlay">
    <div class="auth-box">
      <h1 class="auth-title">Kanban Board</h1>

      <!-- 탭 -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <!-- 이메일/비밀번호 폼 -->
      <form class="auth-form" id="auth-form" novalidate>
        <input id="auth-email" class="auth-input" type="email" placeholder="이메일" autocomplete="email" required />
        <input id="auth-password" class="auth-input" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" required />
        <p class="auth-error hidden" id="auth-error"></p>
        <button class="auth-submit" type="submit" id="auth-submit">로그인</button>
      </form>

      <!-- 구분선 -->
      <div class="auth-divider"><span>또는</span></div>

      <!-- 소셜 로그인 -->
      <div class="auth-social">
        <button class="social-btn google" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Google로 계속하기
        </button>
        <button class="social-btn github" id="btn-github">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub로 계속하기
        </button>
      </div>
    </div>
  </div>

  <!-- ── 앱 본체 (로그인 후 표시) ── -->
  <header class="app-header hidden" id="app-header">
    <h1 class="app-title">Kanban Board</h1>
    <div class="group-controls">
      <select id="group-selector">
        <option value="">내 보드</option>
      </select>
      <button id="btn-create-group">+ 그룹</button>
      <button id="btn-join-group">코드 참여</button>
    </div>
    <div class="user-info">
      <span class="user-email" id="user-email"></span>
      <button class="logout-btn" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="board hidden" id="board">

    <!-- To-do -->
    <section class="column" data-column="todo">
      <div class="column-header">
        <h2 class="column-title">To-do</h2>
        <span class="card-count">0</span>
      </div>
      <div class="column-body" data-column="todo"></div>
      <div class="column-footer">
        <button class="add-card-btn" data-target="todo">+ Add card</button>
        <div class="add-card-form hidden" data-form="todo">
          <textarea class="card-input" placeholder="카드 내용을 입력하세요…" rows="3"></textarea>
          <div class="form-actions">
            <button class="confirm-add-btn" data-target="todo">Add</button>
            <button class="cancel-add-btn" data-target="todo">✕</button>
          </div>
        </div>
      </div>
    </section>

    <!-- In-progress -->
    <section class="column" data-column="inprogress">
      <div class="column-header">
        <h2 class="column-title">In-progress</h2>
        <span class="card-count">0</span>
      </div>
      <div class="column-body" data-column="inprogress"></div>
      <div class="column-footer">
        <button class="add-card-btn" data-target="inprogress">+ Add card</button>
        <div class="add-card-form hidden" data-form="inprogress">
          <textarea class="card-input" placeholder="카드 내용을 입력하세요…" rows="3"></textarea>
          <div class="form-actions">
            <button class="confirm-add-btn" data-target="inprogress">Add</button>
            <button class="cancel-add-btn" data-target="inprogress">✕</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Done -->
    <section class="column" data-column="done">
      <div class="column-header">
        <h2 class="column-title">Done</h2>
        <span class="card-count">0</span>
      </div>
      <div class="column-body" data-column="done"></div>
      <div class="column-footer">
        <button class="add-card-btn" data-target="done">+ Add card</button>
        <div class="add-card-form hidden" data-form="done">
          <textarea class="card-input" placeholder="카드 내용을 입력하세요…" rows="3"></textarea>
          <div class="form-actions">
            <button class="confirm-add-btn" data-target="done">Add</button>
            <button class="cancel-add-btn" data-target="done">✕</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── 그룹 생성 모달 ── -->
  <div id="modal-create-group" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">새 그룹 만들기</h2>
      <input id="group-name-input" type="text" class="modal-input" placeholder="그룹 이름" maxlength="30" />
      <p id="create-group-error" class="modal-error hidden"></p>
      <div class="modal-actions">
        <button id="btn-create-group-confirm" class="confirm-add-btn">만들기</button>
        <button id="btn-create-group-cancel" class="btn-secondary">취소</button>
      </div>
    </div>
  </div>

  <!-- ── 초대 코드 표시 모달 ── -->
  <div id="modal-invite-code" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">그룹이 만들어졌습니다</h2>
      <p class="modal-desc">아래 초대 코드를 멤버에게 공유하세요.</p>
      <div id="invite-code-display" class="invite-code-box"></div>
      <div class="modal-actions">
        <button id="btn-copy-invite-code" class="confirm-add-btn">복사</button>
        <button id="btn-close-invite-code" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>

  <!-- ── 그룹 참여 모달 ── -->
  <div id="modal-join-group" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title">그룹 참여</h2>
      <input id="invite-code-input" type="text" class="modal-input" placeholder="초대 코드 6자리"
             maxlength="6" style="text-transform:uppercase" />
      <p id="join-group-error" class="modal-error hidden"></p>
      <div class="modal-actions">
        <button id="btn-join-group-confirm" class="confirm-add-btn">참여</button>
        <button id="btn-join-group-cancel" class="btn-secondary">취소</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
